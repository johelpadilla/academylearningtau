terms:
  - id: tau_s
    term: "Systemic Tau (τ_s)"
    short: "Ordinal-relational metric of coupling reorganization between variables."
    long: "In sliding windows, it summarizes changes in the shared order structure of the multivariate system. It does not assume univariate critical slowing down."
    level: basico
    related: [recd, ews, bandt_pompe]

  - id: recd
    term: "RECD"
    short: "Discrete Extramental Clock — emergent time of the system."
    long: "Accumulation of ΔRECD advances generated by nested ordinal conjunctions (Φ₁–Φ₃), modulated by the regime λ(τ_s)."
    level: basico
    related: [phi1, phi2, phi3, excess3]

  - id: phi1
    term: "Φ₁ (Level 1)"
    short: "Fraction of pairs of variables with the same ordinal symbol at t."
    long: "Bandt–Pompe coincidence normalized in [0,1]. Statistical basis of the clock; necessary but not sufficient."
    level: intermedio
    related: [phi2, bandt_pompe]

  - id: phi2
    term: "Φ₂ (Level 2)"
    short: "Persistence of pairwise ordinal relations for ≥ d steps."
    long: "Captures relational habits (EQ/GT/LT) that are sustained, not just flashes of equality."
    level: intermedio
    related: [phi1, phi3]

  - id: phi3
    term: "Φ₃ (Level 3)"
    short: "Binary indicator of irreducible synergy above θ₃."
    long: "Activates when excess3 exceeds the threshold. In noisy data, the continuous excess3 is preferred."
    level: intermedio
    related: [excess3, recd]

  - id: excess3
    term: "excess3"
    short: "Continuous proxy of irreducible ordinal synergy (Level 3)."
    long: "Combines total correlation excess with respect to pairs and/or joint surprise vs. independence. Primary metric in CCTP."
    level: intermedio
    related: [phi3, surrogates]

  - id: bandt_pompe
    term: "Bandt–Pompe Patterns"
    short: "Local permutation symbols of a series (ordinal embedding)."
    long: "With dimension m and delay τ, an alphabet of m! patterns is obtained, the basis of Φ₁–Φ₃ and many permutation entropies."
    level: basico
    related: [tau_s, phi1]

  - id: ews
    term: "Classical EWS"
    short: "Univariate Early Warning Signals (var, AR1, etc.)."
    long: "Motivated by critical slowing down. Useful but incomplete when the transition is a multivariate reorganization."
    level: basico
    related: [csd, tau_s]

  - id: csd
    term: "Critical Slowing Down"
    short: "Slowing of recovery near a bifurcation."
    long: "Predicts var↑ and AR1↑ in many models. It is not the only generic pathway in real physiology."
    level: basico
    related: [ews]

  - id: breathing_window
    term: "Breathing Window"
    short: "Analysis window whose length adapts to the system's regime."
    long: "Avoids the bias of a fixed W when the internal 'tempo' (RECD) changes. In Fast mode, a domain-fixed W can be used."
    level: avanzado
    related: [tau_s, recd]

  - id: surrogates
    term: "Surrogates (IAAFT / phase-shuffle)"
    short: "Null series that preserve univariate properties and break the target structure."
    long: "Phase-shuffle: preserves spectrum per channel, destroys cross-dependence. IAAFT: preserves spectrum and distribution. Essential for p-values of Δτ_s and Δexcess3."
    level: intermedio
    related: [excess3, tau_s]

  - id: tda
    term: "TDA / Betti Numbers"
    short: "Topological Data Analysis of the state cloud (Tier 4)."
    long: "Complements the temporal ordinal axis with topology (components, cycles). Expensive; Full mode."
    level: avanzado
    related: [tau_s]

  - id: cctp
    term: "CCTP"
    short: "Cardiac Critical Transitions Protocol."
    long: "Protocol and study that applies τ_s + RECD to SDDB Holters prior to spontaneous VF."
    level: intermedio
    related: [tau_s, excess3]

  - id: kairos
    term: "Kairos vs Chronos"
    short: "Meaningful time of the system vs. time of the external clock."
    long: "Chronos is the CSV index; Kairos are the RECD ticks with reorganization weight."
    level: basico
    related: [recd]
