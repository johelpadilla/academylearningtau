terms:
  - id: tau_s
    term: "Tau Systémique (τ_s)"
    short: "Métrique ordinale-relationnelle de réorganisation du couplage entre variables."
    long: "Dans des fenêtres glissantes, elle résume les changements dans la structure d'ordre partagée du système multivarié. Elle ne suppose pas de ralentissement critique (CSD) univarié."
    level: basico
    related: [recd, ews, bandt_pompe]

  - id: recd
    term: "RECD"
    short: "Horloge Extramentale Discrète — temps émergent du système."
    long: "Accumulation d'avancées ΔRECD générées par des conjonctions ordinales imbriquées (Φ₁–Φ₃), modulées par le régime λ(τ_s)."
    level: basico
    related: [phi1, phi2, phi3, excess3]

  - id: phi1
    term: "Φ₁ (Niveau 1)"
    short: "Fraction de paires de variables avec le même symbole ordinal à t."
    long: "Coïncidence Bandt–Pompe normalisée dans [0,1]. Base statistique de l'horloge ; nécessaire mais non suffisante."
    level: intermedio
    related: [phi2, bandt_pompe]

  - id: phi2
    term: "Φ₂ (Niveau 2)"
    short: "Persistance de relations ordinales par paires pendant ≥ d étapes."
    long: "Capture les habitudes relationnelles (EQ/GT/LT) qui se maintiennent, pas seulement des éclairs d'égalité."
    level: intermedio
    related: [phi1, phi3]

  - id: phi3
    term: "Φ₃ (Niveau 3)"
    short: "Indicateur binaire de synergie irréductible au-dessus de θ₃."
    long: "S'active lorsque l'excess3 dépasse le seuil. Dans les données bruyantes, l'excess3 continu est préféré."
    level: intermedio
    related: [excess3, recd]

  - id: excess3
    term: "excess3"
    short: "Proxy continu de la synergie ordinale irréductible (Niveau 3)."
    long: "Combine l'excès de corrélation totale par rapport aux paires et/ou la surprise conjointe vs l'indépendance. Métrique principale dans le CCTP."
    level: intermedio
    related: [phi3, surrogates]

  - id: bandt_pompe
    term: "Modèles Bandt–Pompe"
    short: "Symboles de permutation locale d'une série (intégration ordinale)."
    long: "Avec la dimension m et le délai τ, on obtient un alphabet de m! modèles, base de Φ₁–Φ₃ et de nombreuses entropies de permutation."
    level: basico
    related: [tau_s, phi1]

  - id: ews
    term: "EWS Classiques"
    short: "Signaux d'Alerte Précoce univariés (var, AR1, etc.)."
    long: "Motivés par le ralentissement critique (CSD). Utiles mais incomplets lorsque la transition est une réorganisation multivariée."
    level: basico
    related: [csd, tau_s]

  - id: csd
    term: "Ralentissement Critique (CSD)"
    short: "Ralentissement de la récupération près d'une bifurcation."
    long: "Prédit var↑ et AR1↑ dans de nombreux modèles. Ce n'est pas la seule voie générique dans la physiologie réelle."
    level: basico
    related: [ews]

  - id: breathing_window
    term: "Breathing Window (Fenêtre Respirante)"
    short: "Fenêtre d'analyse dont la longueur s'adapte au régime du système."
    long: "Évite le biais d'un W fixe lorsque le 'tempo' interne (RECD) change. En mode Fast, un W fixe de domaine peut être utilisé."
    level: avanzado
    related: [tau_s, recd]

  - id: surrogates
    term: "Surrogates (IAAFT / phase-shuffle)"
    short: "Séries nulles qui préservent les propriétés univariées et détruisent la structure cible."
    long: "Phase-shuffle : préserve le spectre par canal, détruit la dépendance croisée. IAAFT : préserve le spectre et la distribution. Essentiels pour les valeurs p de Δτ_s et Δexcess3."
    level: intermedio
    related: [excess3, tau_s]

  - id: tda
    term: "TDA / Nombres de Betti"
    short: "Analyse Topologique des Données (TDA) du nuage d'états (Tier 4)."
    long: "Complète l'axe ordinal temporel avec la topologie (composantes, cycles). Coûteux ; mode Full."
    level: avanzado
    related: [tau_s]

  - id: cctp
    term: "CCTP"
    short: "Protocole des Transitions Critiques Cardiaques."
    long: "Protocole et étude qui appliquent τ_s + RECD aux Holters SDDB avant une FV spontanée."
    level: intermedio
    related: [tau_s, excess3]

  - id: kairos
    term: "Kairos vs Chronos"
    short: "Temps significatif du système vs temps de l'horloge externe."
    long: "Chronos est l'index du CSV ; Kairos sont les tics du RECD avec un poids de réorganisation."
    level: basico
    related: [recd]
